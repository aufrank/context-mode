# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

vars:
  GREETING: Hello, world!

tasks:
  install-extension:
    desc: Install context-hub as a Gemini CLI extension
    cmds:
      - npm install
      - npm run bundle:gemini
      - gemini extensions link --consent extensions/gemini-context-hub

  uninstall-extension:
    desc: Uninstall context-hub Gemini CLI extension
    cmds:
      - gemini extensions uninstall context-hub

  # VS Code extension: package the VSIX from `extensions/vscode-context-mode`
  package:
    desc: Package the VS Code extension as a .vsix (requires `@vscode/vsce`)
    cmds:
      - cd extensions/vscode-context-mode; npx -y @vscode/vsce package

  install-vsix:
    desc: Install the generated .vsix into the local VS Code instance
    cmds:
      - cd extensions/vscode-context-mode; code --install-extension *.vsix || true

  lint:vscode:
    desc: Lint the extension files (requires `eslint` configured in your environment)
    cmds:
      - cd extensions/vscode-context-mode; npx -y eslint . --ext .js --max-warnings=0

  lint:fix:
    desc: Run ESLint with --fix to automatically fix problems where possible
    cmds:
      - cd extensions/vscode-context-mode; npx -y eslint . --ext .js --fix

  section:
    desc: Print a colorful section header
    cmds:
      - node -e "const t=process.env.TITLE||''; console.log('\n\x1b[1;36m========================================\x1b[0m'); console.log('\x1b[1;33m'+t+'\x1b[0m'); console.log('\x1b[1;36m========================================\x1b[0m\n');"

  install:vscode:
    desc: Package and install the VS Code extension (.vsix) into the local VS Code
    cmds:
      - |
        node -e "const t='Install: VS Code'; console.log('\n\x1b[1;36m========================================\x1b[0m'); console.log('\x1b[1;33m'+t+'\x1b[0m'); console.log('\x1b[1;36m========================================\x1b[0m\n');"
      - cd extensions/vscode-context-mode; npx -y @vscode/vsce package
      - cd extensions/vscode-context-mode; code --install-extension *.vsix || true

  uninstall:vscode:
    desc: Uninstall the packaged extension (best-effort)
    cmds:
      - |
        node -e "const t='Uninstall: VS Code'; console.log('\n\x1b[1;36m========================================\x1b[0m'); console.log('\x1b[1;33m'+t+'\x1b[0m'); console.log('\x1b[1;36m========================================\x1b[0m\n');"
      - |
        VSIX=$(ls extensions/vscode-context-mode/*.vsix 2>/dev/null || echo "")
        if [ -n "$VSIX" ]; then
          echo "Run 'code --uninstall-extension <publisher>.<name>' to remove the extension or use the VS Code Extensions view."
        else
          echo "No .vsix found in extensions/vscode-context-mode."
        fi

  install:gemini:
    desc: Install the repo as a Gemini CLI extension (alias to install-extension)
    cmds:
      - "task: install-extension"

  uninstall:gemini:
    desc: Uninstall the Gemini CLI extension (alias to uninstall-extension)
    cmds:
      - "task: uninstall-extension"

  help: 
    desc: Show available namespaced tasks
    cmds:
      - 'echo "Available tasks: install-extension, install:gemini, install:vscode, package, install-vsix, lint:vscode, lint:fix, uninstall:vscode, uninstall:gemini"'
